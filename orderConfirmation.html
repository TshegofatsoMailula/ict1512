<!DOCTYPE html>
<html lang="en">
    <head>
        <link rel="stylesheet" href="/assets/css/styles.css">
    </head>
    <body>
        <main>
              <header class="header">
            <nav class="nav">
              <div>
                    <img src="/assets/logo.png" height="60px" width="192px" alt="company-logo">
                </div> 
                <div>
                    <a href="index.html">Home</a>
                    <a href="clientRegistrationForm.html">Create account</a>
                </div>
            </nav>
        </header>
              <!--Client registration form-->
            <form id="order_confirmation">
            <section>
                  <fieldset>
            <legend>Client Registration</legend>
              <div>
                <label for="preferred_name">Preferred name</label>
                <div class="form-input" id="preferred_name"></div>
            </div>

            <div>
                <label for="full_names">Full names (as shown on ID)</label>
                <div class="form-input" id="full_names"></div>
            </div>

            <div>
                <label for="surname">Surname</label>
                <div class="form-input" id="surname"></div>
            </div>

            <div>
                <label for="id_number">ID number</label>
                <div class="form-input" id="id_number"></div>
            </div>

            <div>
                <label for="phone">Cellphone number</label>
                <div class="form-input" id="phone"></div>
            </div>

            <div>
                <label for="email">Email address</label>
                <div class="form-input" id="email"></div>
            </div>

            <div>
                <label for="shipping">Shipping address</label>
                <div class="form-input" id="shipping"></div>
            </div>
        </fieldset>
        </section>
            <!--Credit card form-->
        <section>
            <fieldset>
            <legend>Payment Details</legend>
                 <div>
                <label for="card_name">Name on credit card</label>
                <div class="form-input" id="card_name"></div>
            </div>

            <div>
                <label for="card_type">Credit card type</label>
                <div class="form-input" id="card_type"></div>            
            </div>

            <div>
                <label for="card_number">Card number</label>
                <div class="form-input" id="card_number"></div>
            </div>
                    </fieldset>
            <button type="submit" id="submitButton">Continue shopping</button>
            </form>
        </section>
        </main>
        <script type="module" src="/assets/js/scripts.js"></script>
    </body>
</html>
